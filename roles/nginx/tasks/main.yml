---
# Установка NGINX
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

# Копируем конфиг для виртуального хоста в цикле
- name: Create vhost configuration from template
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item }}.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ sites }}"
  notify: Reload Nginx

# Включаем сайты (создаём symlink)
- name: Enable vhost sites
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item }}.conf"
    state: link
  loop: "{{ sites }}"
  notify: Reload Nginx

# Создаём корневые директории для сайтов
- name: Create document root directories
  ansible.builtin.file:
    path: "/var/www/{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  loop: "{{ sites }}"

# Копируем стартовые страницы в цикле
- name: Create index.html from template
  ansible.builtin.template:
    src: index.html.j2
    dest: "/var/www/{{ item }}/index.html"
    owner: www-data
    group: www-data
    mode: '0644'
  loop: "{{ sites }}"
  notify: Reload Nginx

# Удаляем дефолтный сайт nginx
- name: Remove default Nginx site
  ansible.builtin.file:
    path: "/etc/nginx/sites-enabled/default"
    state: absent
  notify: Reload Nginx
